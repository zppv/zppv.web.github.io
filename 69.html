/* خلفية الماتريكس */
#matrixCanvas {

/* Scene containers */
.scene {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease;
  z-index: 1;
}
.hidden { opacity: 0; pointer-events: none; }

/* Scene 1: typewriter effect */

  white-space: pre;
  letter-spacing: .05em;

  border-radius: 10px;

/* Scene 2: layout */
.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding: 20px;
}

.video-frame {
  border: 2px solid #fff;
  box-shadow: 0 0 20px #fff;
  border-radius: 8px;
  overflow: hidden;
  width: 640px;
  max-width: 90vw;
  height: 360px;
  position: relative;
  background: #111;
}

.video-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  animation: slideShow 12s infinite;
}

.video-frame img:nth-child(2) { animation-delay: 4s; }
.video-frame img:nth-child(3) { animation-delay: 8s; }

@keyframes slideShow {
  0% { opacity: 0; }
  10% { opacity: 1; filter: brightness(1.1); }
  33% { opacity: 1; }
  43% { opacity: 0; }
  100% { opacity: 0; }
}

.hacked {
  font-size: 2.5em;
  text-shadow: 0 0 10px #fff;
  animation: flashText 1.5s infinite alternate;
}

.terminal {
  width: 640px;
  max-width: 90vw;
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

.terminal-header {
  background: #222;
  padding: 5px;
  display: flex;
  gap: 5px;
}

.btn { width: 9px; height: 9px; border-radius: 50%; }
.btn.close { background: #ff5f57; }
.btn.min { background: #ffbd2e; }

  color: #ccc;

<script>
// --- كود الماتريكس ---
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const nums = '0123456789';
const alphabet = katakana + latin + nums;

const fontSize = 16;
const columns = canvas.width / fontSize;
const rainDrops = Array.from({ length: columns }).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0F0';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < rainDrops.length; i++) {
    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.alphabet.length));
    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

    if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      rainDrops[i] = 0;
    }
    rainDrops[i]++;
  }
}
let matrixInterval = setInterval(drawMatrix, 30);

// --- كود الكتابة والانتقال ---
const fullText = SECURITY ALERT IT's LULA BIRTHDAY...

const soundElem = document.getElementById('typeSound');

    typeElem.textContent += ch;
    if (ch !== "\n" && ch !== " ") {

      soundElem.play().catch(()=>{});

    setTimeout(typeWriter, 75);
  } else {

}

function showScene2() {
