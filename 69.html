<script>
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
let matrixInterval;

function initMatrix() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = new Array(columns).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    matrixInterval = setInterval(drawMatrix, 35);
}

// تعديل علامات الاقتباس هنا لتعمل بشكل صحيح
const fullText = `SECURITY ALERT LULA's BIRTHDAY .. ..`;

const typeElem = document.getElementById('typeText');
const soundElem = document.getElementById('typeSound');
let idx = 0;

function typeWriter() {

    typeElem.textContent += fullText.charAt(idx++);
    soundElem.currentTime = 0;
    soundElem.play().catch(()=>{});
    setTimeout(typeWriter, 80);
  } else {
    setTimeout(showScene2, 2000);
  }
}

function showScene2() {
  clearInterval(matrixInterval);
  canvas.style.display = 'none';
  document.getElementById('scene1').classList.add('hidden');
  document.getElementById('scene2').classList.remove('hidden');
  document.getElementById('bgMusic').play().catch(()=>{});
}

// بدء التشغيل بعد ضغطة الزر

    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('scene1').classList.remove('hidden');
    initMatrix();
    typeWriter();
});
